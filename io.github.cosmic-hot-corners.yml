id: io.github.cosmic-hot-corners
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: cosmic-hot-corners

finish-args:
  # Wayland socket (required — no X11 fallback)
  - --socket=wayland
  # Shared memory (IPC) for wgpu/rendering
  - --share=ipc
  # GPU access for wgpu renderer
  - --device=dri
  # D-Bus: workspaces overview
  - --talk-name=com.system76.CosmicWorkspaces
  # D-Bus: app launcher
  - --talk-name=com.system76.CosmicLauncher
  # Autostart: write .desktop file on login
  - --filesystem=xdg-config/autostart:create
  # cosmic-config: store and watch settings
  - --filesystem=xdg-config/cosmic:create

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/cosmic-hot-corners/cargo
    CARGO_NET_OFFLINE: 'true'

modules:
  - name: cosmic-hot-corners
    buildsystem: simple
    build-commands:
      - cargo build --release --offline --frozen
      - install -Dm755 target/release/cosmic-hot-corners /app/bin/cosmic-hot-corners
      - install -Dm644 resources/io.github.cosmic-hot-corners.desktop
          /app/share/applications/io.github.cosmic-hot-corners.desktop
      - install -Dm644 resources/io.github.cosmic-hot-corners.settings.desktop
          /app/share/applications/io.github.cosmic-hot-corners.settings.desktop
      - install -Dm644 resources/app.metainfo.xml
          /app/share/metainfo/io.github.cosmic-hot-corners.metainfo.xml
      - install -Dm644 resources/icons/hicolor/scalable/apps/icon.svg
          /app/share/icons/hicolor/scalable/apps/io.github.cosmic-hot-corners.svg
    sources:
      - type: git
        url: https://github.com/boloto1979/cosmic-hotcorners.git
        tag: v0.1.0
        commit: b0c4a46a0506e75718e227f235ceea165c802198
      # Generated by: python3 build-aux/flatpak-cargo-generator.py Cargo.lock -o generated-sources.json
      # See: https://github.com/flatpak/flatpak-builder-tools/tree/master/cargo
      - generated-sources.json
